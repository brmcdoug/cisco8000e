# Observe-only: log outbound TCP/22 connect attempts to the c8101 lab mgmt subnet.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-outbound-ssh-sonic-lab-observe
spec:
  kprobes:
    - call: "security_socket_connect"
      syscall: false
      args:
        - index: 0
          type: "socket"
        - index: 1
          type: "sockaddr"
        - index: 2
          type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Protocol"
              values:
                - "IPPROTO_TCP"
            - index: 1
              operator: "Family"
              values:
                - "AF_INET"
            - index: 1
              operator: "SAddr"
              values:
                - "172.20.2.0/24"
                - "10.1.1.0/24"
                - "10.0.0.0/24"
            - index: 1
              operator: "SPort"
              values:
                - "22"
          matchActions:
            - action: Post
