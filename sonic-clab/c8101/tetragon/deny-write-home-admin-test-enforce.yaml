# Enforce: deny writes/creates/truncates under /home/admin/test only.
# Tetragon is allow-by-default; only matching operations are affected.
# Uses Override (EACCES) instead of Sigkill so a mis-tuned rule is less likely to kill your SSH session.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-write-home-admin-test-enforce
spec:
  kprobes:
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test"
            - index: 1
              operator: "Equal"
              values:
                - "2" # MAY_WRITE — covers echo >>, cp dest, touch, etc.
          matchActions:
            - action: Override
              argError: -13 # -EACCES

    - call: "security_path_truncate"
      syscall: false
      return: true
      args:
        - index: 0
          type: "path"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test"
          matchActions:
            - action: Override
              argError: -13
