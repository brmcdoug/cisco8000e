# Enforce: deny creates and writes under /home/admin/test only.
# Tetragon is allow-by-default; only matching operations are affected.
#
# sys_openat Override requires return/returnArg (see Tetragon selectors docs).
# Requires CONFIG_BPF_KPROBE_OVERRIDE and sys_openat in error_injection list.
#
# Uses Override (EACCES) instead of Sigkill so tee/cp fail cleanly without killing SSH.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-write-home-admin-test-enforce
spec:
  kprobes:
    - call: "sys_openat"
      syscall: true
      return: true
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "string"
        - index: 2
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 2
              operator: "Mask"
              values:
                - "64" # O_CREAT
                - "1"  # O_WRONLY
                - "2"  # O_RDWR
          matchActions:
            - action: Override
              argError: -13
            - action: NoPost

    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 1
              operator: "Equal"
              values:
                - "2" # MAY_WRITE
          matchActions:
            - action: Override
              argError: -13
