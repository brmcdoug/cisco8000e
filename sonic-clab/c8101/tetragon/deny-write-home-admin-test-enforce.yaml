# Enforce: deny creates and writes under /home/admin/test only.
# Tetragon is allow-by-default; only matching operations are affected.
#
# Why sys_openat (not security_inode_create / security_path_truncate):
# - tee/cp use open(O_CREAT|O_TRUNC). Truncate hooks fire AFTER the empty inode
#   exists, so Override on truncate yields "Permission denied" + zero-byte files.
# - Override on security_inode_create only works if that symbol is in the kernel
#   error-injection list (often it is not). sys_openat Override is the supported path.
#
# Uses Override (EACCES) instead of Sigkill so tee/cp fail cleanly without killing SSH.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-write-home-admin-test-enforce
spec:
  kprobes:
    # Block open/openat that creates or opens for write under the test directory.
    # No "return: true" — Override replaces the syscall at entry (see Tetragon selectors docs).
    - call: "sys_openat"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "string"
        - index: 2
          type: "int"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 2
              operator: "Mask"
              values:
                - "64" # O_CREAT
                - "1"  # O_WRONLY
                - "2"  # O_RDWR
          matchActions:
            - action: Override
              argError: -13
            - action: NoPost

    # Backup: writes to paths already opened (or odd code paths that skip openat match).
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 1
              operator: "Equal"
              values:
                - "2" # MAY_WRITE
          matchActions:
            - action: Override
              argError: -13
