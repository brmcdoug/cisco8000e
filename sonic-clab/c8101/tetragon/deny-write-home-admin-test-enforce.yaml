# Enforce: deny creates and writes under /home/admin/test only.
# Tetragon in this demo is allow-by-default; only matching operations are affected.
#
# This SONiC kernel (6.1) does NOT support Override on syscalls (no bpf_override_return
# for sys_openat). Use security_* LSM hooks instead.
#
# Do NOT add security_path_truncate here — it fires after O_CREAT and leaves empty files.
#
# Keep only this file (not *-fallback.yaml) in policies/ when enforcing.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-write-home-admin-test-enforce
spec:
  kprobes:
    # Block inode creation when parent directory is /home/admin/test (or below).
    - call: "security_inode_create"
      syscall: false
      return: true
      args:
        - index: 0
          type: "path"
        - index: 1
          type: "dentry"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/home/admin/test"
          matchActions:
            - action: Override
              argError: -13
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
          matchActions:
            - action: Override
              argError: -13
        - matchArgs:
            - index: 1
              operator: "Prefix"
              values:
                - "/home/admin/test/"
          matchActions:
            - action: Override
              argError: -13

    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 1
              operator: "Equal"
              values:
                - "2" # MAY_WRITE
          matchActions:
            - action: Override
              argError: -13
