# Observe-only: log writes under /home/admin/test without blocking anything.
# Load this first during the demo, then switch to -enforce.yaml when ready.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-write-home-admin-test-observe
spec:
  kprobes:
    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int" # 2 = MAY_WRITE, 4 = MAY_READ
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test"
            - index: 1
              operator: "Equal"
              values:
                - "2"
          matchActions:
            - action: Post

    - call: "security_path_truncate"
      syscall: false
      return: true
      args:
        - index: 0
          type: "path"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test"
          matchActions:
            - action: Post
