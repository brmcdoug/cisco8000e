# Observe-only: log creates and writes under /home/admin/test without blocking.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-write-home-admin-test-observe
spec:
  kprobes:
    - call: "security_inode_create"
      syscall: false
      return: true
      args:
        - index: 0
          type: "path"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/home/admin/test"
          matchActions:
            - action: Post
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
          matchActions:
            - action: Post
      ignore:
        callNotFound: true

    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 1
              operator: "Equal"
              values:
                - "2"
          matchActions:
            - action: Post
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/home/admin/test"
            - index: 1
              operator: "Equal"
              values:
                - "2"
          matchActions:
            - action: Post

    - call: "security_path_truncate"
      syscall: false
      return: true
      args:
        - index: 0
          type: "path"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
          matchActions:
            - action: Post
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/home/admin/test"
          matchActions:
            - action: Post
      ignore:
        callNotFound: true
