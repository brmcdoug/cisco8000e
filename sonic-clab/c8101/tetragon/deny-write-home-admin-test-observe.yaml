# Observe-only: log open/create/write attempts under /home/admin/test without blocking.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-write-home-admin-test-observe
spec:
  kprobes:
    - call: "sys_openat"
      syscall: true
      return: true
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "string"
        - index: 2
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 2
              operator: "Mask"
              values:
                - "64"
                - "1"
                - "2"
          matchActions:
            - action: Post

    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/home/admin/test/"
            - index: 1
              operator: "Equal"
              values:
                - "2"
          matchActions:
            - action: Post
