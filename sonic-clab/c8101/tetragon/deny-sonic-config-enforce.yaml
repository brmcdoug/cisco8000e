# Enforce: block SONiC "config" CLI; allow "show" and everything else.
#
# SONiC config/show are usually Python scripts (#!/usr/bin/python3). matchBinaries
# sees the interpreter, not the script — match argv[1] for the config script path.
#
# Uses Sigkill (works on this kernel; syscall Override does not).
# Allow-by-default: "show" and other commands are unaffected.
#
# Warning: blocks ALL config invocations, including automation (ansible config load).
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-sonic-config-enforce
spec:
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "string"
      selectors:
        # Native config binary (if not a shebang script on your image)
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/local/bin/config"
                - "/usr/bin/config"
          matchActions:
            - action: Sigkill

        # Python shebang: execve(python3, [..., "/usr/local/bin/config", ...])
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "In"
              values:
                - "/usr/local/bin/config"
                - "/usr/bin/config"
          matchActions:
            - action: Sigkill

        # Fallback if argv[1] is a relative path ending in /config
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "Postfix"
              values:
                - "/config"
          matchActions:
            - action: Sigkill
