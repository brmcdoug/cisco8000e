# Enforce: block SONiC "config" CLI; allow "show" and everything else.
#
# sys_execve + Sigkill does NOT block on this SONiC image: config/show are Python
# scripts executed via binfmt (kernel execs the interpreter, not the script path).
# Use security_* LSM hooks with Override (same mechanism as the file policy).
#
# Warning: blocks ALL config invocations, including automation (ansible config load).
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-sonic-config-enforce
spec:
  kprobes:
    # Primary: deny exec when the binary being prepared is the config script.
    - call: "security_bprm_check"
      syscall: false
      return: true
      args:
        - index: 0
          type: "linux_binprm"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/local/bin/config"
          matchActions:
            - action: Override
              argError: -13
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/config"
          matchActions:
            - action: Override
              argError: -13

    # Backup: block when creds are loaded from the config script file (shebang path).
    - call: "security_bprm_creds_from_file"
      syscall: false
      return: true
      args:
        - index: 0
          type: "nop"
        - index: 1
          type: "file"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/local/bin/config"
          matchActions:
            - action: Override
              argError: -13
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/bin/config"
          matchActions:
            - action: Override
              argError: -13
