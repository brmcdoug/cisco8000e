# Enforce: block SONiC "config" CLI; allow "show" and everything else.
#
# SONiC config/show are usually Python scripts (#!/usr/bin/python3). matchBinaries
# sees the interpreter, not the script — match argv[1] for the config script path.
#
# matchArgs only supports Equal/Prefix/Postfix/etc. — not "In" (use multiple selectors).
#
# Uses Sigkill (works on this kernel; syscall Override does not).
# Warning: blocks ALL config invocations, including automation (ansible config load).
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-sonic-config-enforce
spec:
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "string"
      selectors:
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/local/bin/config"
                - "/usr/bin/config"
          matchActions:
            - action: Sigkill

        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/local/bin/config"
          matchActions:
            - action: Sigkill

        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/bin/config"
          matchActions:
            - action: Sigkill

        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "Postfix"
              values:
                - "/config"
          matchActions:
            - action: Sigkill
