# Observe-only: log when SONiC config CLI is about to exec (for tuning paths).
#
# Uses security_bprm_check (linux_binprm path) — not sys_execve, which misses
# Python shebang scripts on this kernel.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-sonic-config-observe
spec:
  kprobes:
    - call: "security_bprm_check"
      syscall: false
      args:
        - index: 0
          type: "linux_binprm"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/local/bin/config"
          matchActions:
            - action: Post
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/usr/bin/config"
          matchActions:
            - action: Post

    - call: "security_bprm_creds_from_file"
      syscall: false
      args:
        - index: 0
          type: "nop"
        - index: 1
          type: "file"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/local/bin/config"
          matchActions:
            - action: Post
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/bin/config"
          matchActions:
            - action: Post
