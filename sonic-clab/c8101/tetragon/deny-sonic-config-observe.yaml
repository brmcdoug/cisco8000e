# Observe-only: log exec of SONiC config CLI without blocking (for tuning paths).
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-sonic-config-observe
spec:
  kprobes:
    - call: "sys_execve"
      syscall: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "string"
      selectors:
        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/local/bin/config"
                - "/usr/bin/config"
          matchActions:
            - action: Post

        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/local/bin/config"
          matchActions:
            - action: Post

        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "/usr/bin/config"
          matchActions:
            - action: Post

        - matchBinaries:
            - operator: "In"
              values:
                - "/usr/bin/python3"
                - "/usr/local/bin/python3"
          matchArgs:
            - index: 1
              operator: "Postfix"
              values:
                - "/config"
          matchActions:
            - action: Post
