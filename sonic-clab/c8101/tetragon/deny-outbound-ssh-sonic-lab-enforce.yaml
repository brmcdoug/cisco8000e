# Enforce: block outbound SSH (TCP/22) to other nodes on the c8101 lab mgmt network.
#
# Stops lateral movement after compromise: processes on this switch cannot open
# new TCP connections to 172.20.2.0/24:22 (leaf00–leaf02, spine00–spine01).
#
# Inbound SSH (admin logging into this node) is unaffected — only connect() is hooked.
# Uses security_socket_connect + Override (same LSM mechanism as file/config policies).
#
# Tune DAddr if your topology mgmt subnet differs (see sonic-clab/c8101/topology.yaml).
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: deny-outbound-ssh-sonic-lab-enforce
spec:
  kprobes:
    - call: "security_socket_connect"
      syscall: false
      return: true
      args:
        - index: 0
          type: "socket"
        - index: 1
          type: "sockaddr"
        - index: 2
          type: "int"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Protocol"
              values:
                - "IPPROTO_TCP"
            - index: 1
              operator: "Family"
              values:
                - "AF_INET"
            - index: 1
              operator: "SAddr"
              values:
                - "172.20.2.0/24"
                - "10.1.1.0/24"
                - "10.0.0.0/24"
            - index: 1
              operator: "SPort"
              values:
                - "22"
          matchActions:
            - action: Override
              argError: -13
