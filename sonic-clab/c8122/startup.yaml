connections:
    custom:
        mgmt:
            ports: [R0.eth0]
            ovs_bridge: mgmt_br
            connection_type: tap   

        eth1:
            ports: [R0.eth1]
            ovs_bridge: br-Port0
        
        eth2:
            ports: [R0.eth2]
            ovs_bridge: br-Port1